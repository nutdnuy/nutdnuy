<svg xmlns="http://www.w3.org/2000/svg" width="1180" height="610" viewBox="0 0 1180 610" role="img" aria-labelledby="title desc">
<title id="title">Nuthdanai Wangpratham — Quant researcher and AI agent builder</title>
<desc id="desc">An original animated sci-fi parody scene: a quant scientist and junior analyst emerge from a luminous research portal.</desc>
<defs>
